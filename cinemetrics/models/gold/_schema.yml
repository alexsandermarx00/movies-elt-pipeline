version: 2

models:
  - name: dim_date
    description: >
      Standard date dimension spanning 1970–2030. Surrogate key is a stable
      row_number ordered by date, so it will not change as long as the spine
      range is not altered.
    columns:
      - name: date_key
        description: Surrogate key (integer).
        tests:
          - unique
          - not_null
      - name: date_day
        description: Calendar date.
      - name: year
      - name: quarter
      - name: month_number
      - name: month_name
      - name: day_of_month
      - name: day_of_week
        description: 0 = Sunday (DuckDB default).
      - name: day_name
      - name: week_of_year
      - name: year_quarter
        description: Formatted label, e.g. "2024-Q3".

  - name: dim_movie
    description: >
      One row per movie (SCD Type 1). Metacritic and Rotten Tomatoes records are
      matched on imdb_id via a Wikidata-curated IMDB→RT slug mapping (P345/P1258).
      Unmatched records from either platform are retained via FULL OUTER JOIN, so
      mc_slug or rt_movie_id may be NULL. Primary genre is the first element of the
      Metacritic genres JSON array; multi-genre modelling is deferred to future work.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 1000000
    columns:
      - name: movie_key
        description: Surrogate key.
        tests:
          - unique
          - not_null
      - name: movie_natural_key
        description: mc_slug when available, rt_movie_id otherwise.
      - name: mc_slug
        description: Metacritic movie slug; NULL for RT-only movies.
      - name: rt_movie_id
        description: Rotten Tomatoes movie_id; NULL for MC-only movies.
      - name: title
      - name: release_year
      - name: rating
        description: MPAA/content rating from Metacritic.
      - name: duration_minutes
      - name: imdb_id
      - name: primary_genre
        description: First genre from Metacritic. NULL for RT-only movies.
      - name: rt_urlid
        description: RT URL slug, useful for linking. NULL for MC-only movies.

  - name: dim_critic
    description: >
      One row per critic (by author_slug). Sourced from Metacritic and Rotten
      Tomatoes critic reviews. MC slugs are prefixed with 'mc::'; RT slugs are
      prefixed with 'rt::' and derived from the critic name. The most recently
      loaded row per slug is kept to handle name or publication corrections.
    columns:
      - name: critic_key
        description: Surrogate key.
        tests:
          - unique
          - not_null
      - name: author_slug
        description: >
          Critic natural key. Prefixed with 'mc::' for Metacritic critics,
          'rt::' for Rotten Tomatoes critics.
      - name: critic_name
      - name: publication_name
      - name: publication_slug

  - name: fact_movie_score
    description: >
      One row per (movie, platform) with current-state aggregate scores.
      No history is tracked (see future work). Metacritic user scores are
      normalised from 0–10 to 0–100 (multiplied by 10). Rotten Tomatoes
      critic_score is the Tomatometer percentage (0–100) and user_score is
      the Popcornmeter percentage computed from
      audienceAll.likedCount / (likedCount + notLikedCount).
    columns:
      - name: score_key
        description: Surrogate key.
        tests:
          - unique
          - not_null
      - name: movie_key
        description: FK → dim_movie.
        tests:
          - not_null
          - relationships:
              to: ref('dim_movie')
              field: movie_key
      - name: platform
        description: "'metacritic' or 'rottentomatoes'."
        tests:
          - accepted_values:
              values: ['metacritic', 'rottentomatoes']
      - name: critic_score
        description: >
          MC: Metascore (0–100). RT: Tomatometer percentage (0–100).
      - name: user_score
        description: >
          Audience score normalised to 0–100 scale.
          MC raw score (0–10) is multiplied by 10. RT Popcornmeter is already 0–100.
      - name: critic_review_count
      - name: user_review_count
        description: >
          MC: number of user reviews with a score. RT: total audience votes
          (liked + not-liked).

  - name: fact_critic_review
    description: >
      One row per critic review (transactional grain) from Metacritic and Rotten
      Tomatoes. Surrogate keys from dim_movie, dim_critic, and dim_date are resolved
      via LEFT JOIN, so rows with unresolvable keys will have NULL FKs rather than
      being dropped.
    columns:
      - name: critic_review_key
        description: Surrogate key.
        tests:
          - unique
          - not_null
      - name: movie_key
        description: FK → dim_movie. NULL if movie not in dim_movie.
        tests:
          - relationships:
              to: ref('dim_movie')
              field: movie_key
      - name: critic_key
        description: FK → dim_critic. NULL if critic not in dim_critic.
        tests:
          - relationships:
              to: ref('dim_critic')
              field: critic_key
      - name: date_key
        description: FK → dim_date. NULL if review_date is unparseable.
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: platform
        description: "'metacritic' or 'rottentomatoes'."
      - name: score
        description: Critic score (0–100).
      - name: quote
        description: Review excerpt.
