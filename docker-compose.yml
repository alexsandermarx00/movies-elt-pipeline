---
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: airflow_jwt_secret
    AIRFLOW__API_AUTH__JWT_ISSUER: airflow
    # Fixed key so ALL containers encrypt/decrypt Variables (and connections)
    # consistently. Without it each container generates its own ephemeral key and
    # Variables written by airflow-init read back as null in the scheduler.
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-BUBhgfoidP8tgCmLstnEwq72C5i-CrElw2kdzppZVe4=}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Pipeline behavior/rate knobs are NOT env vars — they live as Airflow
    # Variables (Admin > Variables in the UI) so they can be changed live without
    # recreating containers. Defaults are seeded once by airflow-init below
    # (mc_movie_limit, mc_discover_by_year, mc_request_delay_*, rt_download_delay, …).
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./cinemetrics:/opt/airflow/cinemetrics
    - ./rottentomatoes_spider:/opt/scrapers/rottentomatoes_spider
    - ./mc_scrape:/opt/scrapers/mc_scrape
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        mkdir -p /opt/airflow/data/{rt,mc}
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
        # Pools and Variables must be created THROUGH /entrypoint: it sets up the
        # airflow env (this init container runs as root, where `airflow` isn't
        # importable) and migrates the DB first.
        # Variables are only SEEDED if absent (get || set), so values edited in
        # the UI survive container recreation. Change them live in Admin > Variables.
        exec /entrypoint bash -c '
          set -e
          airflow pools set duckdb 128 "Pool for duckdb tasks"
          airflow pools set mc_scrape 3 "Bounds concurrent Metacritic scrape tasks (rate dial)"
          airflow pools set rt_scrape 3 "Bounds concurrent Rotten Tomatoes scrape processes (rate dial)"
          seed() { airflow variables list -o plain 2>/dev/null | grep -qx "$1" || airflow variables set "$1" "$2"; }
          seed mc_movie_limit 0           # movies to scrape per run; 0 = no cap (all discovered)
          seed mc_discover_by_year false  # true = catalog-scale year-sharded discovery
          seed mc_discover_year_min 1990
          seed mc_discover_year_max 2026
          seed mc_discover_max_per_year 2000
          seed mc_request_delay_min 1.0   # per-request throttle (seconds)
          seed mc_request_delay_max 3.0
          seed mc_max_retries 5           # MC 429/5xx transport retries
          seed rt_download_delay 2        # RT per-request delay (seconds)
          seed rt_retry_times 5           # RT 429/503 retries
          airflow version'
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
  airflow-logs:
